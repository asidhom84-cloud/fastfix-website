name: push-dispatcher

on:
  schedule:
    - cron: "*/1 * * * *"
  workflow_dispatch:

jobs:
  run-dispatcher:
    runs-on: ubuntu-latest

    steps:
      - name: Call Supabase push-dispatcher
        run: |
          curl -X POST "https://${{ secrets.SUPABASE_PROJECT_REF }}.functions.supabase.co/push-dispatcher" \
          -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
          -H "apikey: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
          -H "Content-Type: application/json" \
          -d '{}'
